#Mouse config ---------------------
# CONFIG_PMW3610_INVERT_X=y             # 有効化でX軸をドライバ段で反転（overlayのinvert-xでも調整可能）
# CONFIG_PMW3610_INVERT_Y=y             # 有効化でY軸をドライバ段で反転（overlayのinvert-yでも調整可能）
# CONFIG_PMW3610_SWAP_XY=y              # 有効化でX/Y軸を入れ替え（センサーの搭載向き補正向け）
# CONFIG_PMW3610_REPORT_INTERVAL_MIN=12 # 下げると報告頻度が上がり滑らかになりやすいが、消費電力は増える
# CONFIG_PMW3610_LOG_LEVEL_DBG=y        # デバッグログ出力を有効化（動作確認向け、通常運用ではノイズ多め）
# CONFIG_PMW3610_INIT_POWER_UP_EXTRA_DELAY_MS=300 # 起動直後のセンサー安定待ち時間。電源投入直後に不安定な場合に増やす

#Encoder config -------------------
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

#Battery config -------------------
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

#Layer LED config -------------------
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_HIGH=30
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_CRITICAL=10
CONFIG_RGBLED_WIDGET_SHOW_LAYER_COLORS=y

#ZMK Studio config -------------------
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n

#Bluetooth config -------------------
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=12
