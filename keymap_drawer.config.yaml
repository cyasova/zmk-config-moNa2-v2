parse_config:
  modifier_fn_map:
    left_ctrl: ⌃
    right_ctrl: ⌃
    left_shift: ⇧
    right_shift: ⇧
    left_alt: ⌥
    right_alt: ⌥
    left_gui: ⌘
    right_gui: ⌘
  zmk_keycode_map:
    LCTRL: ⌃
    LEFT_ALT: ⌥
    RALT: ⌥
    LEFT_COMMAND: ⌘
    LEFT_SHIFT: ⇧
    ENTER: ↩
    BACKSPACE: ⌫
    ESCAPE: Esc
    DELETE: Del
    PRINTSCREEN: PrtSc
    LANGUAGE_1: Lang1
    LANGUAGE_2: Lang2
    PAGE_UP: PgUp
    PAGE_DOWN: PgDn
    UP_ARROW: ↑
    DOWN_ARROW: ↓
    LEFT_ARROW: ←
    RIGHT_ARROW: →
    SEMICOLON: ;
    COMMA: ","
    DOT: .
    SLASH: /
    MINUS: "-"
    EQUAL: "="
    LEFT_BRACKET: "["
    RIGHT_BRACKET: "]"
    LEFT_PARENTHESIS: "("
    RIGHT_PARENTHESIS: ")"
    DOUBLE_QUOTES: '"'
    SQT: "'"
    BACKSLASH: "\\"
    PIPE: "|"
    UNDERSCORE: _
    EXCLAMATION: "!"
    AT_SIGN: "@"
    POUND: "#"
    DOLLAR: $
    PERCENT: "%"
    CARET: "^"
    AMPERSAND: "&"
    ASTERISK: "*"
    GRAVE: "`"
    TILDE: "~"
    PLUS: +

draw_config:
  key_rx: 8
  key_ry: 8
  dark_mode: false
  shrink_wide_legends: 6
  svg_extra_style: |
    svg.keymap {
      font-family: "Aptos", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      fill: #1f1f24;
    }

    rect.key {
      fill: #f5f5f7;
      stroke: #c6c6cc;
      stroke-width: 1.2;
    }

    rect.combo,
    rect.combo-separate {
      fill: #e6f1ff;
      stroke: #7a9cc9;
    }

    rect.held,
    rect.combo.held {
      fill: #fff0de;
      stroke: #dfad73;
    }

    text.trans {
      fill: #8e8e93;
    }

    text.label,
    text.footer {
      fill: #6e6e73;
      stroke: #ffffff;
    }

    path.combo {
      stroke: #8f97a3;
    }

    .keypos-37 rect.key:not(.held):not(.ghost),
    .keypos-38 rect.key:not(.held):not(.ghost),
    .keypos-39 rect.key:not(.held):not(.ghost),
    .keypos-40 rect.key:not(.held):not(.ghost),
    .keypos-41 rect.key:not(.held):not(.ghost),
    .keypos-42 rect.key:not(.held):not(.ghost),
    .keypos-43 rect.key:not(.held):not(.ghost),
    .keypos-44 rect.key:not(.held):not(.ghost),
    .keypos-45 rect.key:not(.held):not(.ghost) {
      fill: #e9e9ee;
      stroke: #b0b0b8;
    }

    .keypos-36 rect.key:not(.held):not(.ghost),
    .keypos-37 rect.key:not(.held):not(.ghost),
    .keypos-38 rect.key:not(.held):not(.ghost),
    .keypos-39 rect.key:not(.held):not(.ghost),
    .keypos-40 rect.key:not(.held):not(.ghost) {
      fill: #ddeeff;
      stroke: #86a9d6;
    }

    @media (prefers-color-scheme: dark) {
      svg.keymap {
        fill: #f5f5f7;
      }

      rect.key {
        fill: #2c2c2e;
        stroke: #5a5a60;
      }

      rect.combo,
      rect.combo-separate {
        fill: #24364c;
        stroke: #6f95c8;
      }

      rect.held,
      rect.combo.held {
        fill: #7a5736;
        stroke: #f0b779;
      }

      text.trans {
        fill: #8e8e93;
      }

      text.label,
      text.footer {
        fill: #f5f5f7;
        stroke: #121214;
      }

      path.combo {
        stroke: #798391;
      }

      .keypos-37 rect.key:not(.held):not(.ghost),
      .keypos-38 rect.key:not(.held):not(.ghost),
      .keypos-39 rect.key:not(.held):not(.ghost),
      .keypos-40 rect.key:not(.held):not(.ghost),
      .keypos-41 rect.key:not(.held):not(.ghost),
      .keypos-42 rect.key:not(.held):not(.ghost),
      .keypos-43 rect.key:not(.held):not(.ghost),
      .keypos-44 rect.key:not(.held):not(.ghost),
      .keypos-45 rect.key:not(.held):not(.ghost) {
        fill: #3a3a3f;
        stroke: #7a7a82;
      }

      .keypos-36 rect.key:not(.held):not(.ghost),
      .keypos-37 rect.key:not(.held):not(.ghost),
      .keypos-38 rect.key:not(.held):not(.ghost),
      .keypos-39 rect.key:not(.held):not(.ghost),
      .keypos-40 rect.key:not(.held):not(.ghost) {
        fill: #2b3f57;
        stroke: #7fa1ce;
      }
    }
